# Render Blueprint - Deploy OnChord with one click
# https://render.com/docs/infrastructure-as-code

services:
  # ============================================
  # ML Service (Python FastAPI)
  # ============================================
  - type: web
    name: onchord-ml-service
    runtime: python
    region: oregon
    rootDir: ml-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: LASTFM_API_KEY
        sync: false
    autoDeploy: true

  # ============================================
  # Frontend (React/Vite Static Site)
  # ============================================
  - type: web
    name: onchord-frontend
    env: static
    rootDir: OnChord Frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: build
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_SPOTIFY_CLIENT_ID
        sync: false
      - key: VITE_SPOTIFY_REDIRECT_URI
        sync: false
      - key: VITE_TICKETMASTER_API_KEY
        sync: false
      - key: VITE_ML_SERVICE_URL
        sync: false
